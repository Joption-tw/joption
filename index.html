<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歐大時間價值追蹤儀 - V5.7.2</title>
    <!-- 載入必要 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

    <style>
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; overflow-x: hidden; }
        #main-chart { height: 440px; width: 100%; } 
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 0.75rem;
        }
        /* 極細捲軸 */
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .version-badge {
            background: linear-gradient(90deg, #f97316, #fb923c);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: 900;
            color: white;
        }

        /* 按壓感橘色浮水印按鈕 */
        .session-btn {
            width: 100%;
            padding: 0.375rem 0.25rem;
            border-radius: 0.5rem;
            font-size: 10px;
            font-weight: 900;
            transition: all 75ms;
            border: 1px solid rgba(251, 146, 60, 0.2);
            background-color: rgba(255, 247, 237, 0.3);
            color: rgba(194, 65, 12, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }
        .session-btn:active { transform: scale(0.9); box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06); }
        .session-btn.active {
            background-color: #f97316;
            color: white;
            border-color: #ea580c;
            box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.2);
            transform: scale(1.05);
            z-index: 10;
        }
        .session-btn.night { background-color: rgba(241, 245, 249, 0.5); border-color: rgba(203, 213, 225, 0.5); color: #64748b; }
        .session-btn.night.active { background-color: #1e293b; color: white; border-color: #0f172a; }

        /* Modal 樣式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background-color: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-container {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 64rem; 
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.2s;
            border: 1px solid #e2e8f0;
        }
        .modal-overlay.active .modal-container { transform: scale(1); }

        .interactive-card { cursor: pointer; transition: all 75ms; user-select: none; }
        .interactive-card:hover { border-color: #fdba74; }
        .interactive-card:active { transform: scale(0.97); background-color: #f8fafc; }
        
        .excel-cell-ultra { border: 1px solid #e2e8f0; padding: 0.25rem; display: flex; flex-direction: column; justify-content: center; background-color: white; transition: background-color 0.2s; }
        .excel-row-main { display: flex; align-items: center; justify-content: space-between; }
        .excel-row-sub { display: flex; align-items: center; justify-content: space-between; margin-top: 0.125rem; padding-top: 0.125rem; border-top: 1px solid #f1f5f9; }
        .excel-font-lg { font-size: 12px; font-weight: 900; letter-spacing: -0.025em; }
        .excel-font-sm { font-size: 11px; font-weight: 700; font-family: ui-monospace, monospace; letter-spacing: -0.05em; }
    </style>
</head>
<body class="p-2 md:p-4">
    <div class="max-w-[1600px] mx-auto space-y-2">
        <!-- Header -->
        <header class="flex items-center justify-between glass-card px-4 py-1.5 shadow-sm">
            <div class="flex items-center gap-2">
                <img src="IP標籤.jpg" alt="Logo" class="w-9 h-9 rounded-md object-cover shadow-sm" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">

                    <div class="flex items-center gap-1.5">

            <div class="flex items-center gap-2">
                <div id="status-tag" class="hidden sm:flex items-center gap-1.5 px-2 py-1 bg-slate-50 rounded text-[9px] font-bold border border-slate-200">

                <button id="refresh-btn" class="flex items-center gap-1.5 px-3 py-1 bg-orange-600 hover:bg-orange-700 active:scale-90 text-white rounded-md font-black text-[11px] shadow-sm transition-all duration-75">
                    <i data-lucide="refresh-ccw" class="w-3 h-3"></i> 同步

        <!-- Session Switcher -->
        <div class="glass-card p-2 shadow-sm">
            <div id="session-switcher" class="grid grid-cols-5 md:grid-cols-10 gap-1 w-full">
                <!-- JS 產生按鈕 -->
            </div>
        </div>

        <!-- Spotlight Panel -->
        <div id="spotlight-panel" class="grid grid-cols-1 md:grid-cols-4 gap-2">
            <div id="card-50pt" class="glass-card p-2.5 border-l-4 border-l-orange-400 interactive-card flex flex-col justify-center">
                <p class="stat-label-mini text-orange-500 mb-1 flex items-center gap-1"><i data-lucide="activity" class="w-2.5 h-2.5"></i> 50點波段 (漲/跌/合)</p>
                <div class="flex items-baseline justify-between">
                    <span id="spot-up-50" class="stat-value-mini text-red-500 font-bold">--</span>
                    <span class="text-slate-300 mx-1 text-[10px]">|</span>
                    <span id="spot-down-50" class="stat-value-mini text-emerald-600 font-bold">--</span>
                    <span class="text-slate-300 mx-1 text-[10px]">|</span>
                    <span id="spot-sum-50" class="stat-sum-highlight">--</span>
                </div>
            </div>

            <div id="card-100pt" class="glass-card p-2.5 border-l-4 border-l-orange-600 interactive-card flex flex-col justify-center">
                <p class="stat-label-mini text-orange-700 mb-1 flex items-center gap-1"><i data-lucide="flame" class="w-2.5 h-2.5"></i> 100點波段 (漲/跌/合)</p>
                <div class="flex items-baseline justify-between">
                    <span id="spot-up-100" class="stat-value-mini text-red-500 font-black">--</span>
                    <span class="text-slate-300 mx-1 text-[10px]">|</span>
                    <span id="spot-down-100" class="stat-value-mini text-emerald-600 font-black">--</span>
                    <span class="text-slate-300 mx-1 text-[10px]">|</span>
                    <span id="spot-sum-100" class="stat-sum-highlight text-orange-700">--</span>
                </div>
            </div>

            <div id="card-wed" class="glass-card p-2.5 border-l-4 border-l-sky-500 interactive-card flex items-center justify-between">
                <div class="flex flex-col">
                    <p class="stat-label-mini text-sky-600 mb-0.5 uppercase">週三選耗損</p>
                    <span id="spot-wed-val" class="text-[18px] font-black tracking-tighter leading-none text-slate-800">--</span>
                </div>
                <span id="spot-wed-pct" class="text-[11px] font-bold text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">--%</span>
            </div>

            <div id="card-fri" class="glass-card p-2.5 border-l-4 border-l-emerald-500 interactive-card flex items-center justify-between">
                <div class="flex flex-col">
                    <p class="stat-label-mini text-emerald-600 mb-0.5 uppercase">週五選耗損</p>
                    <span id="spot-fri-val" class="text-[18px] font-black tracking-tighter leading-none text-slate-800">--</span>
                </div>
                <span id="spot-fri-pct" class="text-[11px] font-bold text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">--%</span>
            </div>
        </div>

        <!-- Chart Area -->
        <div class="glass-card p-2 shadow-sm relative overflow-hidden ring-1 ring-black/5">
            <div id="loading-overlay" class="absolute inset-0 z-50 flex items-center justify-center bg-white/90 backdrop-blur-sm transition-opacity duration-300">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-8 h-8 border-3 border-orange-600/20 border-t-orange-600 rounded-full animate-spin"></div>
                    <p class="text-orange-600 font-bold text-[11px]">數據精確定位中</p>
                </div>
            </div>
            <div id="main-chart"></div>
        </div>

        <!-- 常駐型波段掃描明細 -->
        <div id="on-page-scan-details" class="glass-card p-3 shadow-sm overflow-hidden bg-slate-50/30">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <div class="p-1 bg-slate-800 rounded text-white"><i data-lucide="scan-line" class="w-3.5 h-3.5"></i></div>
                    <h2 id="scan-details-title" class="text-[12px] font-black text-slate-700 uppercase tracking-tighter">當前波段掃描報表 (100pt)</h2>
                </div>
                <div id="scan-details-summary" class="flex gap-4 text-[10px] font-black">
                    <!-- JS 動態填入總和 -->
                </div>
            </div>
            <div id="scan-details-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-0.5">
                <div class="col-span-full py-4 text-center text-slate-300 italic font-medium">請選擇時段以查看報表</div>
            </div>
        </div>

        <!-- Minimal Detail Table (全盤匯總) -->
        <div class="glass-card p-3 shadow-sm overflow-hidden">
            <div class="flex items-center gap-2 mb-2">
                <div class="p-1 bg-orange-50 rounded text-orange-600"><i data-lucide="table-2" class="w-3.5 h-3.5"></i></div>
                <h2 class="text-[12px] font-black text-slate-700 uppercase tracking-tighter">全盤分級明細匯總</h2>
            </div>
            <div class="overflow-x-auto text-[10px]">
                <table class="w-full text-left decay-table border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 border-b border-slate-100 text-center font-bold">
                            <th class="p-1 border-r text-left pl-2">時段</th>
                            <th class="p-1 text-orange-600">50點 (漲/跌)</th>
                            <th class="p-1 text-orange-700 border-r">100點 (漲/跌)</th>
                            <th class="p-1 text-sky-600">週三 (%)</th>
                            <th class="p-1 text-emerald-600">週五 (%)</th>
                        </tr>
                    </thead>
                    <tbody id="decay-table-body" class="font-mono text-slate-700">
                        <tr><td colspan="5" class="text-center py-4 text-slate-300 italic font-sans font-medium">數據載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="detailed-modal" class="modal-overlay">
        <div class="modal-container">
            <div class="px-5 py-3 border-b border-slate-100 flex items-center justify-between bg-slate-50/80 backdrop-blur-sm">
                <div class="flex items-center gap-2">
                    <div id="modal-icon-bg" class="p-1.5 bg-orange-500 rounded-lg text-white shadow-sm">
                        <i id="modal-icon" data-lucide="file-text" class="w-4 h-4"></i>
                    </div>
                    <h3 id="modal-title" class="text-sm font-black text-slate-800">詳細報表</h3>
                </div>
                <button id="btn-close-modal" class="p-1.5 hover:bg-slate-200 rounded transition-all">
                    <i data-lucide="x" class="w-4 h-4 text-slate-400"></i>
                </button>
            </div>
            <div id="modal-summary-bar" class="hidden bg-slate-900 px-4 py-2 flex items-center justify-between text-white shadow-inner border-b border-white/5 font-black text-[11px]"></div>
            <div class="max-h-[70vh] overflow-y-auto p-1 bg-slate-100 custom-scrollbar" id="modal-content"></div>
            <div class="p-2 bg-white border-t border-slate-200 flex justify-end">
                <button id="btn-modal-ok" class="px-6 py-1.5 bg-slate-800 hover:bg-slate-900 active:scale-95 text-white text-[10px] font-black rounded shadow-sm transition-all">關閉</button>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1AsY4_MJipaMp_cNLpyeXTpFGnG0FD4vWJu-SDRdvtME/export?format=csv&gid=2119845045';
        let chart; let globalData = null; let currentSessionIdx = -1;
        
        const rowRanges = [
            { label: '周三晚', start: 2, end: 419, type: 'night' },
            { label: '週四早', start: 420, end: 569, type: 'day' },
            { label: '周四晚', start: 570, end: 989, type: 'night' },
            { label: '週五早', start: 990, end: 1139, type: 'day' },
            { label: '週五晚', start: 1140, end: 1559, type: 'night' },
            { label: '周一早', start: 1560, end: 1709, type: 'day' },
            { label: '周一晚', start: 1710, end: 2129, type: 'night' },
            { label: '週二早', start: 2130, end: 2279, type: 'day' },
            { label: '周二晚', start: 2280, end: 2699, type: 'night' },
            { label: '週三早', start: 2700, end: 2849, type: 'day' }
        ];

        function parseCSVLine(text) {
            const res = []; let cur = ""; let inQ = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') { if (inQ && text[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
                else if (char === ',' && !inQ) { res.push(cur.trim()); cur = ""; }
                else cur += char;
            }
            res.push(cur.trim()); return res;
        }

        function cleanNumeric(v) {
            if (v === undefined || v === null || v.toString().trim() === "") return null;
            const num = parseFloat(v.toString().replace(/,/g, '').replace(/[^0-9.-]/g, ''));
            return (isNaN(num) || num === 0) ? null : num;
        }

        // V5.7.2 修復：修正 detectSwings 結尾檢查時 currentHigh 未定義的問題
        function detectSwings(prices, times, threshold) {
            let dataArr = [];
            for (let i = 0; i < prices.length; i++) if (prices[i] !== null) dataArr.push({ val: prices[i], time: times[i] });
            if (dataArr.length < 2) return { upCount: 0, upSum: 0, downCount: 0, downSum: 0, list: [] };
            
            let upC = 0, upS = 0, downC = 0, downS = 0, list = [];
            let lastE = dataArr[0], curH = dataArr[0], curL = dataArr[0], trend = 0; 

            for (let i = 1; i < dataArr.length; i++) {
                let p = dataArr[i];
                if (trend === 0) {
                    if (p.val >= lastE.val + threshold) { trend = 1; curH = p; }
                    else if (p.val <= lastE.val - threshold) { trend = -1; curL = p; }
                } else if (trend === 1) {
                    if (p.val > curH.val) curH = p;
                    else if (p.val <= curH.val - threshold) {
                        upC++; let d = curH.val - lastE.val; upS += d;
                        list.push({ type: '上漲', from: lastE, to: curH, diff: d });
                        trend = -1; lastE = curH; curL = p;
                    }
                } else if (trend === -1) {
                    if (p.val < curL.val) curL = p;
                    else if (p.val >= curL.val + threshold) {
                        downC++; let d = lastE.val - curL.val; downS += d;
                        list.push({ type: '下跌', from: lastE, to: curL, diff: d });
                        trend = 1; lastE = curL; curH = p;
                    }
                }
            }
            // 修正：將 currentHigh 改為 curH，currentLow 改為 curL
            if (trend === 1 && curH.val > lastE.val + threshold) { 
                upC++; let d = curH.val - lastE.val; upS += d; 
                list.push({ type: '上漲', from: lastE, to: curH, diff: d }); 
            } else if (trend === -1 && curL.val < lastE.val - threshold) { 
                downC++; let d = lastE.val - curL.val; downS += d; 
                list.push({ type: '下跌', from: lastE, to: curL, diff: d }); 
            }
            return { upCount: upC, upSum: upS, downCount: downC, downSum: downS, list };
        }

        function getDecay(sub) {
            const f = sub.filter(v => v !== null);
            if (f.length < 6) return null;
            const d = f[f.length - 3] - f[2];
            return { d, p: (d / f[2]) * 100, p3: f[2], plast3: f[f.length-3] };
        }

        function calculateStats(range, data) {
            const start = range.start - 2; const end = range.end - 2;
            const subY1 = [], subTimes = [], subWed = [], subFri = [];
            for (let i = start; i <= end; i++) {
                subY1.push(data.y1[i]); subTimes.push(data.x[i]);
                subWed.push(data.y2a[i]); subFri.push(data.y2b[i]);
            }
            return { s50: detectSwings(subY1, subTimes, 50), s100: detectSwings(subY1, subTimes, 100), wed: getDecay(subWed), fri: getDecay(subFri) };
        }

        function renderOnPageDetails(idx) {
            if (idx === -1 || !globalData) return;
            const range = rowRanges[idx];
            const stats = calculateStats(range, globalData);
            const grid = document.getElementById('scan-details-grid');
            const summary = document.getElementById('scan-details-summary');
            const title = document.getElementById('scan-details-title');

            title.innerText = `${range.label} - 波段掃描報表 (100pt)`;
            summary.innerHTML = `
                <span class="text-red-500">漲: ${stats.s100.upCount}次/${stats.s100.upSum.toFixed(0)}點</span>
                <span class="text-emerald-600">跌: ${stats.s100.downCount}次/${stats.s100.downSum.toFixed(0)}點</span>
                <span class="text-orange-600 border-l border-slate-200 pl-2">合: ${(stats.s100.upSum + stats.s100.downSum).toFixed(0)}點</span>
            `;

            grid.innerHTML = '';
            if (stats.s100.list.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-6 text-center text-slate-300 italic font-bold uppercase tracking-widest text-[11px]">此盤無 100pt 以上波動</div>';
            } else {
                stats.s100.list.forEach((it, i) => {
                    const isUp = it.type === '上漲';
                    const timeOnly = it.from.time.split(' ')[1] || it.from.time;
                    const div = document.createElement('div');
                    div.className = `excel-cell-ultra shadow-xs border-l-4 ${isUp ? 'border-l-red-500' : 'border-l-emerald-500'}`;
                    div.innerHTML = `
                        <div class="excel-row-main">
                            <div class="flex items-center gap-1">
                                <span class="excel-font-lg text-slate-400">#${i+1}</span>
                                <span class="excel-font-lg ${isUp ? 'text-red-500' : 'text-emerald-600'}">${it.type}</span>
                                <span class="excel-font-lg ${isUp ? 'text-red-600' : 'text-emerald-700'}">${it.diff.toFixed(0)}</span>
                            </div>
                        </div>
                        <div class="excel-row-sub">
                            <span class="excel-font-lg text-slate-500 opacity-80">${timeOnly}</span>
                            <span class="excel-font-sm text-slate-600">${it.from.val.toFixed(0)} → ${it.to.val.toFixed(0)}</span>
                        </div>
                    `;
                    grid.appendChild(div);
                });
            }
        }

        function updateSpotlight(idx) {
            if (idx === -1 || !globalData) return;
            const stats = calculateStats(rowRanges[idx], globalData);
            document.getElementById('spot-up-50').innerText = `${stats.s50.upCount}/${stats.s50.upSum.toFixed(0)}`;
            document.getElementById('spot-down-50').innerText = `${stats.s50.downCount}/${stats.s50.downSum.toFixed(0)}`;
            document.getElementById('spot-sum-50').innerText = (stats.s50.upSum + stats.s50.downSum).toFixed(0);
            document.getElementById('spot-up-100').innerText = `${stats.s100.upCount}/${stats.s100.upSum.toFixed(0)}`;
            document.getElementById('spot-down-100').innerText = `${stats.s100.downCount}/${stats.s100.downSum.toFixed(0)}`;
            document.getElementById('spot-sum-100').innerText = (stats.s100.upSum + stats.s100.downSum).toFixed(0);
            const fmt = (vId, pId, d) => {
                const el = document.getElementById(vId), pEl = document.getElementById(pId);
                if (!d) { el.innerText = '--'; pEl.innerText = '--%'; return; }
                const s = d.d > 0 ? '+' : ''; el.innerText = `${s}${d.d.toFixed(1)}`;
                el.className = `text-[18px] font-black tracking-tighter leading-none ${d.d < 0 ? 'text-red-500' : 'text-emerald-500'}`;
                pEl.innerText = `${s}${d.p.toFixed(1)}%`;
            };
            fmt('spot-wed-val', 'spot-wed-pct', stats.wed); fmt('spot-fri-val', 'spot-fri-pct', stats.fri);
        }

        function showDetailedModal(type) {
            if (currentSessionIdx === -1) return;
            const range = rowRanges[currentSessionIdx];
            const stats = calculateStats(range, globalData);
            const overlay = document.getElementById('detailed-modal');
            const summaryBar = document.getElementById('modal-summary-bar');
            const content = document.getElementById('modal-content');
            content.innerHTML = ''; summaryBar.classList.add('hidden');

            if (type === '50pt' || type === '100pt') {
                const threshold = type === '50pt' ? 50 : 100;
                const swingData = type === '50pt' ? stats.s50 : stats.s100;
                document.getElementById('modal-title').innerText = `${range.label} - ${threshold}pt 波段細節`;
                summaryBar.classList.remove('hidden');
                summaryBar.innerHTML = `<div class="flex-1 text-red-400">漲: ${swingData.upCount}x/${swingData.upSum.toFixed(0)}pt</div><div class="flex-1 text-emerald-400 pl-3">跌: ${swingData.downCount}x/${swingData.downSum.toFixed(0)}pt</div><div class="flex-1 text-orange-400 text-right">合: ${(swingData.upSum + swingData.downSum).toFixed(0)} pt</div>`;
                let html = `<div class="grid grid-cols-2 lg:grid-cols-4 gap-0.5">`;
                swingData.list.forEach((it, i) => {
                    const isUp = it.type === '上漲';
                    const t = it.from.time.split(' ')[1] || it.from.time;
                    html += `<div class="excel-cell-ultra border-l-4 ${isUp?'border-l-red-500':'border-l-emerald-500'}"><div class="excel-row-main"><span class="excel-font-lg text-slate-400">#${i+1}</span><span class="excel-font-lg ${isUp?'text-red-500':'text-emerald-600'}">${it.type} ${it.diff.toFixed(0)}</span></div><div class="excel-row-sub"><span class="excel-font-lg text-slate-500">${t}</span><span class="excel-font-sm">${it.from.val.toFixed(0)}→${it.to.val.toFixed(0)}</span></div></div>`;
                });
                html += `</div>`; content.innerHTML = html;
            } else {
                const isW = type === 'wed'; const d = isW ? stats.wed : stats.fri;
                document.getElementById('modal-title').innerText = `${range.label} - ${isW?'週三':'週五'}選詳細基準`;
                if (d) content.innerHTML = `<div class="grid grid-cols-2 gap-1 p-1"><div class="border p-2 bg-white rounded flex flex-col items-center"><span class="text-[9px] font-bold text-slate-400">P3 START</span><span class="text-lg font-black text-slate-800">${d.p3.toFixed(1)}</span></div><div class="border p-2 bg-white rounded flex flex-col items-center"><span class="text-[9px] font-bold text-slate-400">PL3 END</span><span class="text-lg font-black text-slate-800">${d.plast3.toFixed(1)}</span></div></div><div class="mx-1 bg-slate-900 rounded-lg p-5 text-center text-white shadow-xl mt-1"><p class="text-5xl font-black tracking-tighter">${d.d>0?'+':''}${d.d.toFixed(1)}</p><p class="text-lg font-black text-orange-400 mt-1">${d.p.toFixed(2)}%</p></div>`;
            }
            overlay.classList.add('active');
            if (typeof lucide !== 'undefined') lucide.createIcons();
        }

        function selectSession(idx) {
            currentSessionIdx = idx;
            document.querySelectorAll('.session-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx));
            updateSpotlight(idx);
            renderOnPageDetails(idx);
            
            if (chart && idx !== -1) {
                const r = rowRanges[idx]; const sIdx = r.start - 2; const eIdx = Math.min(r.end - 2, globalData.x.length - 1);
                const sX = (sIdx / globalData.x.length) * 100; const eX = (eIdx / globalData.x.length) * 100;
                const subY1 = globalData.y1.slice(sIdx, eIdx + 1).filter(v => v !== null);
                const subY2 = [...globalData.y2a.slice(sIdx, eIdx+1), ...globalData.y2b.slice(sIdx, eIdx+1)].filter(v => v !== null);
                const allY1 = globalData.y1.filter(v => v !== null); const allY2 = [...globalData.y2a, ...globalData.y2b].filter(v => v !== null);
                const gMinY1 = Math.min(...allY1), gMaxY1 = Math.max(...allY1), gMinY2 = Math.min(...allY2), gMaxY2 = Math.max(...allY2);
                const getPct = (v, min, max) => Math.max(0, Math.min(100, ((v - min) / (max - min)) * 100));
                chart.dispatchAction({
                    type: 'dataZoom',
                    batch: [
                        { dataZoomIndex: 0, start: sX, end: eX },
                        { dataZoomIndex: 1, start: getPct(Math.min(...subY1)*0.996, gMinY1, gMaxY1), end: getPct(Math.max(...subY1)*1.004, gMinY1, gMaxY1) },
                        { dataZoomIndex: 2, start: getPct(Math.min(...subY2)*0.92, gMinY2, gMaxY2), end: getPct(Math.max(...subY2)*1.08, gMinY2, gMaxY2) }
                    ]
                });
            }
        }

        function initChart(data) {
            const chartDom = document.getElementById('main-chart');
            if (chart) chart.dispose(); chart = echarts.init(chartDom, null, { renderer: 'canvas' });
            const tbody = document.getElementById('decay-table-body'); tbody.innerHTML = '';
            const markAreas = []; const markExtrema = { symbol: 'pin', symbolSize: 22, label: { show: true, fontSize: 8, fontWeight: 'bold' }, data: [{ type: 'max', itemStyle: { color: '#ef4444' } }, { type: 'min', itemStyle: { color: '#3b82f6' } }] };
            rowRanges.forEach((range, i) => {
                const start = range.start - 2;
                if (start >= 0 && start < data.x.length) {
                    const stats = calculateStats(range, data);
                    const color = range.type === 'night' ? 'rgba(241, 245, 249, 0.7)' : 'rgba(255, 255, 255, 1)';
                    const fmtD = (d) => d ? `${d.p.toFixed(0)}%` : '--';
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-orange-50/30 border-b border-slate-50 transition-colors text-center";
                    tr.innerHTML = `<td class="p-1 font-bold border-r text-slate-500 text-left pl-2">${range.label}</td><td class="p-1 text-red-500 font-bold">${stats.s50.upCount}/${stats.s50.upSum.toFixed(0)} <span class="text-emerald-500 font-normal ml-1">${stats.s50.downCount}/${stats.s50.downSum.toFixed(0)}</span></td><td class="p-1 text-red-600 font-black border-r">${stats.s100.upCount}/${stats.s100.upSum.toFixed(0)} <span class="text-emerald-600 font-black ml-1">${stats.s100.downCount}/${stats.s100.downSum.toFixed(0)}</span></td><td class="p-1 ${stats.wed?.d<0?'text-red-500 font-bold':''}">${fmtD(stats.wed)}</td><td class="p-1 ${stats.fri?.d<0?'text-red-500 font-bold':''}">${fmtD(stats.fri)}</td>`;
                    tbody.appendChild(tr);
                    markAreas.push([{ name: `${range.label}\n漲${stats.s100.upCount}跌${stats.s100.downCount}`, xAxis: data.x[start], itemStyle: { color: color }, label: { show: true, position: 'insideTopLeft', distance: 10, color: '#94a3b8', fontWeight: 'bold', fontSize: 8, lineHeight: 10, backgroundColor: 'rgba(255,255,255,0.7)', padding: [2, 4], borderRadius: 4, formatter: '{b}' } }, { xAxis: data.x[Math.min(range.end-2, data.x.length-1)] }]);
                }
            });
            const opt = {
                backgroundColor: '#ffffff', legend: { data: ['期貨指數', '週三選', '週五選'], top: 2, textStyle: { color: '#64748b', fontWeight: 'bold', fontSize: 11 } },
                grid: { top: '8%', left: '50', right: '50', bottom: '50', containLabel: true }, tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                dataZoom: [{ type: 'slider', xAxisIndex:[0], bottom: 5, height: 25, fillerColor: 'rgba(249, 115, 22, 0.1)', handleStyle: { color: '#f97316' } }, { type: 'slider', yAxisIndex:[0], left: '1', width: 10 }, { type: 'slider', yAxisIndex:[1], right: '1', width: 10 }, { type: 'inside', xAxisIndex:[0] }],
                xAxis: { type: 'category', data: data.x, boundaryGap: false, axisLabel: { fontSize: 8, color: '#cbd5e1' } },
                yAxis: [{ type: 'value', name: '期指', scale: true, axisLabel: { fontSize: 8, color: '#c2410c' } }, { type: 'value', name: '選', position: 'right', scale: true, axisLabel: { fontSize: 8, color: '#c2410c' } }],
                series: [{ name: '期貨指數', type: 'line', yAxisIndex: 0, data: data.y1, smooth: true, showSymbol: false, lineStyle: { width: 2, color: '#2563eb' }, areaStyle: { color: 'rgba(37, 99, 235, 0.1)' }, markArea: { silent: true, data: markAreas }, markPoint: markExtrema }, { name: '週三選', type: 'line', yAxisIndex: 1, data: data.y2a, smooth: true, showSymbol: false, lineStyle: { width: 1.5, color: '#059669' }, markPoint: markExtrema }, { name: '週五選', type: 'line', yAxisIndex: 1, data: data.y2b, smooth: true, showSymbol: false, lineStyle: { width: 1.5, color: '#d97706', type: 'dashed' }, markPoint: markExtrema }]
            };
            chart.setOption(opt);
        }

        async function fetchData() {
            const overlay = document.getElementById('loading-overlay'); overlay.style.opacity = '1'; overlay.classList.remove('hidden');
            try {
                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const text = await response.text();
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                const data = { x: [], y1: [], y2a: [], y2b: [] };
                for (let i = 1; i < lines.length; i++) {
                    const cols = parseCSVLine(lines[i]);
                    if (cols.length >= 4) {
                        data.x.push(cols[0]); data.y1.push(cleanNumeric(cols[1]));
                        data.y2a.push(cleanNumeric(cols[2])); data.y2b.push(cleanNumeric(cols[3]));
                    }
                }
                globalData = data; initChart(data);
                const switcher = document.getElementById('session-switcher'); switcher.innerHTML = '';
                rowRanges.forEach((range, i) => {
                    const btn = document.createElement('button');
                    btn.className = `session-btn ${range.type === 'night' ? 'night' : ''}`; btn.innerText = range.label;
                    btn.onclick = () => selectSession(i); switcher.appendChild(btn);
                });
                let lastValid = rowRanges.length - 1; while(lastValid >= 0 && (rowRanges[lastValid].start - 2) >= data.x.length) lastValid--;
                if(lastValid >= 0) selectSession(lastValid);
            } catch (e) { console.error(e); }
            finally { setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.classList.add('hidden'), 300); }, 500); }
        }

        window.onload = () => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
            fetchData();
            
            document.getElementById('card-50pt').onclick = () => showDetailedModal('50pt');
            document.getElementById('card-100pt').onclick = () => showDetailedModal('100pt');
            document.getElementById('card-wed').onclick = () => showDetailedModal('wed');
            document.getElementById('card-fri').onclick = () => showDetailedModal('fri');
            document.getElementById('btn-close-modal').onclick = () => document.getElementById('detailed-modal').classList.remove('active');
            document.getElementById('btn-modal-ok').onclick = () => document.getElementById('detailed-modal').classList.remove('active');
            document.getElementById('refresh-btn').onclick = fetchData;
        };
        window.onresize = () => chart && chart.resize();
    </script>
</body>
</html>
